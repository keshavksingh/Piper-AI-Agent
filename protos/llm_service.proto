syntax = "proto3";

package llm;

service LLMService {
  rpc GenerateAnswer (LLMRequest) returns (LLMResponse);
  rpc ClassifyIntent (IntentRequest) returns (IntentResponse);
  rpc GenerateStructured (StructuredRequest) returns (StructuredResponse);
}

message LLMRequest {
  string prompt = 1;
  repeated string memory = 2;
  string system_prompt = 3;  // Override default system prompt
  float temperature = 4;     // 0 = use default
  int32 max_tokens = 5;      // 0 = use default
}

message LLMResponse {
  string completion = 1;
}

message IntentRequest {
  string query = 1;
  repeated string conversation_context = 2;  // Recent turns for context
}

message IntentResponse {
  string intent = 1;
  float confidence = 2;
  repeated string entities = 3;
  bool needs_clarification = 4;
  string clarification_question = 5;
}

message StructuredRequest {
  string prompt = 1;
  string system_prompt = 2;
  float temperature = 3;
  int32 max_tokens = 4;
}

message StructuredResponse {
  string json_output = 1;
}
